<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 IZYseek</title>
<style>
/* ─── CSS Variables ─── */
:root {
  --bg-primary: #1a1b26;
  --bg-secondary: #24283b;
  --bg-tertiary: #1f2335;
  --bg-hover: #2f3348;
  --text-primary: #c0caf5;
  --text-secondary: #a9b1d6;
  --text-muted: #565f89;
  --accent-blue: #7aa2f7;
  --accent-green: #9ece6a;
  --accent-yellow: #e0af68;
  --accent-red: #f7768e;
  --accent-purple: #bb9af7;
  --accent-cyan: #7dcfff;
  --border-color: #33467c;
  --border-radius: 12px;
  --msg-radius: 16px;
  --font-mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

/* ─── Reset ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ─── Header ─── */
.header {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.header h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--accent-cyan);
}
.header .subtitle {
  font-size: 13px;
  color: var(--text-muted);
  margin-left: auto;
}
#mode-label {
  color: var(--accent-cyan);
}

/* ─── Chat Container ─── */
#chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scroll-behavior: smooth;
}
#chat-container::-webkit-scrollbar {
  width: 6px;
}
#chat-container::-webkit-scrollbar-track {
  background: transparent;
}
#chat-container::-webkit-scrollbar-thumb {
  background: var(--border-color);
  border-radius: 3px;
}

/* ─── Messages ─── */
.message {
  display: flex;
  margin-bottom: 16px;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user { justify-content: flex-end; }
.message.assistant { justify-content: flex-start; }
.message.system { justify-content: center; }

.message .avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
  margin-top: 4px;
}
.message.user .avatar {
  background: var(--accent-blue);
  order: 2;
  margin-left: 10px;
}
.message.assistant .avatar {
  background: var(--accent-purple);
  margin-right: 10px;
}

.message .bubble {
  max-width: 75%;
  padding: 12px 16px;
  border-radius: var(--msg-radius);
  line-height: 1.6;
  font-size: 14px;
  word-wrap: break-word;
}
.message.user .bubble {
  background: var(--accent-blue);
  color: #1a1b26;
  border-bottom-right-radius: 4px;
}
.message.assistant .bubble {
  background: var(--bg-secondary);
  border: 1px solid var(--border-color);
  border-bottom-left-radius: 4px;
}
.message.system .bubble {
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  text-align: center;
}

/* ─── Markdown within bubble ─── */
.bubble h1, .bubble h2, .bubble h3, .bubble h4 {
  margin: 12px 0 8px;
  color: var(--accent-cyan);
}
.bubble h1 { font-size: 18px; }
.bubble h2 { font-size: 16px; }
.bubble h3 { font-size: 15px; }
.bubble p { margin: 6px 0; }
.bubble ul, .bubble ol { margin: 6px 0; padding-left: 20px; }
.bubble li { margin: 3px 0; }
.bubble strong, .bubble b { color: var(--accent-yellow); }
.bubble em, .bubble i { color: var(--accent-cyan); }
.bubble code {
  background: var(--bg-tertiary);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent-green);
}
.bubble pre {
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 12px;
  margin: 8px 0;
  overflow-x: auto;
}
.bubble pre code {
  background: none;
  padding: 0;
  border-radius: 0;
}
.bubble table {
  border-collapse: collapse;
  margin: 8px 0;
  width: 100%;
  font-size: 13px;
}
.bubble th, .bubble td {
  border: 1px solid var(--border-color);
  padding: 6px 10px;
  text-align: left;
}
.bubble th {
  background: var(--bg-tertiary);
  color: var(--accent-cyan);
  font-weight: 600;
}
.bubble tr:nth-child(even) { background: var(--bg-tertiary); }
.bubble a { color: var(--accent-blue); text-decoration: none; }
.bubble a:hover { text-decoration: underline; }
.bubble blockquote {
  border-left: 3px solid var(--accent-blue);
  padding-left: 12px;
  margin: 8px 0;
  color: var(--text-secondary);
}

/* ─── Raw streaming (before markdown render) ─── */
.bubble .streaming-text {
  white-space: pre-wrap;
  word-wrap: break-word;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--accent-green);
  line-height: 1.5;
}

/* ─── Tool Call / Result ─── */
.tool-notice {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 12px;
  margin: 4px 0;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  font-size: 12px;
  color: var(--text-muted);
  animation: fadeIn 0.2s ease;
}
.tool-notice .icon { font-size: 14px; }
.tool-notice .name { color: var(--accent-yellow); font-weight: 600; }
.tool-notice .result-preview {
  color: var(--text-secondary);
  white-space: normal;
  word-break: break-word;
  overflow: visible;
}
/* Allow the text wrapper span to shrink in the flex layout */
.tool-notice > span:last-child {
  min-width: 0;
}

/* ─── Tools Container ─── */
.tools-container {
  display: flex;
  flex-direction: column;
}

/* ─── Info Notice (universal message block) ─── */
.info-notice {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 6px 12px;
  margin: 4px 0;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  font-size: 12px;
  color: var(--text-muted);
  animation: fadeIn 0.2s ease;
}
.info-notice .icon { font-size: 14px; }
.info-notice .info-type { color: var(--accent-cyan); font-weight: 600; }
.info-notice .info-message { color: var(--text-secondary); word-break: break-word; }

/* ─── Tools Container ─── */
.tools-container {
  display: flex;
  flex-direction: column;
}

/* ─── Reasoning (collapsible) ─── */
.reasoning-toggle {
  cursor: pointer;
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 0;
  user-select: none;
}
.reasoning-toggle:hover { color: var(--text-secondary); }
.reasoning-toggle .arrow {
  transition: transform 0.2s;
  font-size: 10px;
}
.reasoning-toggle.open .arrow { transform: rotate(90deg); }
.reasoning-content {
  display: none;
  padding: 8px;
  margin: 4px 0;
  background: var(--bg-tertiary);
  border-radius: 8px;
  border-left: 3px solid var(--accent-purple);
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
}
.reasoning-content.open { display: block; }

/* ─── Input Area ─── */
.input-area {
  background: var(--bg-secondary);
  border-top: 1px solid var(--border-color);
  padding: 12px 20px;
  flex-shrink: 0;
}
.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
#message-input {
  flex: 1;
  background: var(--bg-tertiary);
  border: 1px solid var(--border-color);
  border-radius: var(--border-radius);
  padding: 12px 16px;
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  resize: none;
  outline: none;
  min-height: 60px;
  max-height: 400px;
  transition: border-color 0.2s;
}
#message-input:focus {
  border-color: var(--accent-blue);
}
#message-input::placeholder {
  color: var(--text-muted);
}
#send-btn {
  background: var(--accent-blue);
  color: #1a1b26;
  border: none;
  border-radius: 50%;
  width: 48px;
  height: 48px;
  cursor: pointer;
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, transform 0.1s;
  flex-shrink: 0;
}
#send-btn:hover { background: var(--accent-cyan); }
#send-btn:active { transform: scale(0.95); }
#send-btn:disabled {
  background: var(--border-color);
  cursor: not-allowed;
  opacity: 0.5;
}

/* ─── Typing indicator ─── */
.typing-indicator {
  display: none;
  padding: 8px 0;
}
.typing-indicator.active { display: flex; }
.typing-dot {
  width: 8px; height: 8px;
  background: var(--text-muted);
  border-radius: 50%;
  margin-right: 6px;
  animation: typingBounce 1.4s infinite ease-in-out both;
}
.typing-dot:nth-child(1) { animation-delay: -0.32s; }
.typing-dot:nth-child(2) { animation-delay: -0.16s; }
.typing-dot:nth-child(3) { animation-delay: 0s; }
@keyframes typingBounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* ─── Responsive ─── */
@media (max-width: 600px) {
  .message .bubble { max-width: 90%; font-size: 14px; }
  .header h1 { font-size: 16px; }
  #chat-container { padding: 12px; }
  .input-area { padding: 8px 12px; }
}
</style>
</head>
<body>
  <div class="header">
    <h1>IZYseek</h1>
    <span class="subtitle" id="mode-label">Loading...</span>
  </div>

  <div id="chat-container">
    <div class="message system">
      <div class="bubble">Connected. Ask me anything about the documents.</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="message-input" rows="3" placeholder="Type your question..." autofocus></textarea>
      <button id="send-btn" title="Send">>></button>
    </div>
  </div>

<script>
/* ─── Session ─── */
(function() {
  let sessionId = sessionStorage.getItem('session_id');
  if (!sessionId) {
    sessionId = Date.now().toString(36) + '-' + Math.random().toString(36).slice(2);
    sessionStorage.setItem('session_id', sessionId);
  }

  const chatContainer = document.getElementById('chat-container');
  const input = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  let isStreaming = false;

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 400) + 'px';
  });

  sendBtn.addEventListener('click', sendMessage);

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isStreaming) return;

    // Add user message
    addMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    // Create assistant message placeholder with typing indicator + streaming area
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message assistant';
    msgDiv.innerHTML = '<div class="avatar">🤖</div><div class="bubble"><div class="tools-container"></div><div class="streaming-text" style="display:none"></div><div class="rendered-content"></div><div class="typing-indicator active"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>';
    chatContainer.appendChild(msgDiv);
    isStreaming = true;
    setInputState(false);
    scrollToBottom();

    let bubble = msgDiv.querySelector('.bubble');
    let renderedContentDiv = msgDiv.querySelector('.rendered-content');
    let currentEvent = ''; // track current SSE event type

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ session_id: sessionId, message: text })
      });

      if (!response.ok) {
        renderedContentDiv.textContent = `Error: ${response.status} ${response.statusText}`;
        isStreaming = false;
        setInputState(true);
        return;
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (line.startsWith('event: ')) {
            currentEvent = line.slice(7).trim();
            continue;
          }
          if (line.startsWith('data: ')) {
            const dataStr = line.slice(6);
            try {
              const data = JSON.parse(dataStr);
              processSSEData(data, currentEvent, msgDiv, bubble, renderedContentDiv);
            } catch (e) {
              // Skip malformed JSON
            }
          }
        }
      }
    } catch (err) {
      renderedContentDiv.textContent = `Network error: ${err.message}`;
    } finally {
      isStreaming = false;
      setInputState(true);
      removeTypingIndicator(msgDiv);
      scrollToBottom();
    }
  }

  function processSSEData(data, eventType, msgDiv, bubble, renderedContentDiv) {
    if (!data) return;

    switch (eventType) {
      case 'content_chunk':
        // Show streaming text live during generation
        let st = bubble.querySelector('.streaming-text');
        if (st) {
          st.style.display = 'block';
          st.textContent += data.content || '';
          // Hide rendered content during streaming — will be shown on done
          renderedContentDiv.style.display = 'none';
        }
        scrollToBottom();
        break;

      case 'reasoning_chunk':
        // Show reasoning text live during generation
        let rt = bubble.querySelector('.reasoning-streaming');
        if (!rt) {
          const rd = document.createElement('div');
          rd.className = 'reasoning-streaming';
          rd.style.cssText = 'display:block; padding:8px; margin:4px 0; background:var(--bg-tertiary); border-radius:8px; border-left:3px solid var(--accent-purple); font-size:13px; color:var(--text-muted); line-height:1.5; white-space:pre-wrap;';
          bubble.appendChild(rd);
          rt = rd;
        }
        rt.textContent += data.content || '';
        scrollToBottom();
        break;

      case 'tool_call':
        // Show tool call notification
        const name = data.name || '';
        const args = data.args || '';
        const notice = document.createElement('div');
        notice.className = 'tool-notice';
        notice.innerHTML = '<span class="icon">🔧</span><span>Tool: <span class="name">' + escapeHtml(name) + '</span>(<span class="result-preview">' + escapeHtml(truncate(args, 80)) + '</span>)</span>';
        bubble.querySelector('.tools-container').appendChild(notice);
        scrollToBottom();
        break;

      case 'tool_result':
        // Show tool result notification
        const rname = data.name || '';
        const result = data.result || '';
        const rnotice = document.createElement('div');
        rnotice.className = 'tool-notice';
        rnotice.innerHTML = '<span class="icon">✅</span><span><span class="name">' + escapeHtml(rname) + '</span> → <span class="result-preview">' + escapeHtml(truncate(result, 120)) + '</span></span>';
        bubble.querySelector('.tools-container').appendChild(rnotice);
        scrollToBottom();
        break;

      case 'info':
        // Show universal info message
        const infoType = data.type || '';
        const infoMessage = data.message || '';
        const infoNotice = document.createElement('div');
        infoNotice.className = 'info-notice';
        infoNotice.innerHTML = '<span class="icon">ℹ️</span><span><span class="info-type">' +
          escapeHtml(infoType) + '</span>: <span class="info-message">' +
          escapeHtml(infoMessage) + '</span></span>';
        bubble.querySelector('.tools-container').appendChild(infoNotice);
        scrollToBottom();
        break;

      case 'done':
        removeTypingIndicator(msgDiv);

        // Hide streaming text area
        const stDiv = bubble.querySelector('.streaming-text');
        if (stDiv) { stDiv.style.display = 'none'; stDiv.textContent = ''; }

        // Remove streaming reasoning area
        const rsDiv = bubble.querySelector('.reasoning-streaming');
        if (rsDiv) rsDiv.remove();

        // Show and update rendered content with final HTML
        renderedContentDiv.style.display = 'block';
        renderedContentDiv.innerHTML = data.content_html || '';

        // Add reasoning section if present
        if (data.reasoning_html) {
          const reasoningDiv = document.createElement('div');
          reasoningDiv.innerHTML = '<div class="reasoning-toggle" onclick="toggleReasoning(this)"><span class="arrow">▶</span> <span>Reasoning</span></div><div class="reasoning-content" style="display:none">' + data.reasoning_html + '</div>';
          bubble.appendChild(reasoningDiv);
        }
        scrollToBottom();
        break;
    }
  }

  // ─── Message Helpers ───

  function addMessage(role, text) {
    const msgDiv = document.createElement('div');
    msgDiv.className = 'message ' + role;
    const avatar = role === 'user' ? '👤' : '🤖';
    msgDiv.innerHTML = '<div class="avatar">' + avatar + '</div><div class="bubble"><p>' + escapeHtml(text) + '</p></div>';
    chatContainer.appendChild(msgDiv);
    scrollToBottom();
  }

  window.toggleReasoning = function(el) {
    el.classList.toggle('open');
    const content = el.nextElementSibling;
    if (content) content.style.display = content.style.display === 'none' ? 'block' : 'none';
  };

  function removeTypingIndicator(msgDiv) {
    const indicator = msgDiv.querySelector('.typing-indicator.active');
    if (indicator) indicator.classList.remove('active');
  }

  function setInputState(enabled) {
    input.disabled = !enabled;
    sendBtn.disabled = !enabled;
    if (enabled) input.focus();
  }

  function scrollToBottom() {
    chatContainer.scrollTop = chatContainer.scrollHeight;
  }

  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function truncate(str, maxLen) {
    if (!str) return '';
    return str.length > maxLen ? str.slice(0, maxLen) + '...' : str;
  }

  // Fetch mode config and display active role in header
  fetch('/api/config')
    .then(r => r.json())
    .then(config => {
      document.getElementById('mode-label').textContent = config.label || 'AI Assistant';
    })
    .catch(() => {
      document.getElementById('mode-label').textContent = 'AI Assistant';
    });

  // Initial focus
  input.focus();
})();
</script>
</body>
</html>
